name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────────

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox

      - name: Build catalog
        run: bun run catalog

      - name: Build app
        run: bun run build

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  storybook:
    name: Storybook Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build Storybook
        run: bun run build-storybook --quiet

      - name: Serve Storybook and run tests
        run: |
          bunx http-server storybook-static --port 6006 --silent &
          bunx wait-on tcp:6006 -t 30000
          bun run test:storybook

      - name: Upload Storybook test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-test-results
          path: storybook-test-results/
          retention-days: 7

  # ── Release (short SHA tag + GitHub Release, only on main after tests pass) ──

  release:
    name: Release
    needs: [e2e, storybook]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.slice(0, 7);
            const tag = sha;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
              make_latest: 'true',
            });
            core.info(`Released ${tag}`);
