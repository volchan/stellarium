<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#0d1530"/>
      <stop offset="100%" stop-color="#07080f"/>
    </radialGradient>
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4a9eff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#c8e0ff"/>
      <stop offset="100%" stop-color="#4a9eff"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#4a9eff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="starBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle center radial glow -->
  <ellipse cx="600" cy="280" rx="420" ry="300" fill="url(#centerGlow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#4a9eff" stroke-width="1" stroke-opacity="0.15" rx="0"/>

  <!-- Scattered background stars -->
  <g fill="#ffffff">
    <circle cx="82"  cy="54"  r="1.2" opacity="0.6"/>
    <circle cx="210" cy="120" r="0.9" opacity="0.4"/>
    <circle cx="145" cy="210" r="1.4" opacity="0.5"/>
    <circle cx="320" cy="75"  r="1.0" opacity="0.45"/>
    <circle cx="480" cy="45"  r="1.3" opacity="0.55"/>
    <circle cx="650" cy="90"  r="0.8" opacity="0.35"/>
    <circle cx="820" cy="55"  r="1.1" opacity="0.5"/>
    <circle cx="970" cy="110" r="1.4" opacity="0.45"/>
    <circle cx="1080" cy="70" r="0.9" opacity="0.4"/>
    <circle cx="1140" cy="180" r="1.2" opacity="0.5"/>
    <circle cx="1050" cy="300" r="0.8" opacity="0.35"/>
    <circle cx="1160" cy="420" r="1.3" opacity="0.45"/>
    <circle cx="1100" cy="560" r="1.0" opacity="0.4"/>
    <circle cx="950"  cy="580" r="1.4" opacity="0.5"/>
    <circle cx="780"  cy="600" r="0.9" opacity="0.35"/>
    <circle cx="580"  cy="590" r="1.2" opacity="0.4"/>
    <circle cx="380"  cy="600" r="1.0" opacity="0.45"/>
    <circle cx="200"  cy="570" r="1.3" opacity="0.5"/>
    <circle cx="70"   cy="520" r="0.8" opacity="0.35"/>
    <circle cx="40"   cy="360" r="1.2" opacity="0.4"/>
    <circle cx="100"  cy="430" r="0.9" opacity="0.45"/>
    <circle cx="55"   cy="190" r="1.1" opacity="0.5"/>
    <circle cx="730"  cy="550" r="0.8" opacity="0.35"/>
    <circle cx="440"  cy="530" r="1.0" opacity="0.4"/>
    <circle cx="900"  cy="530" r="1.2" opacity="0.45"/>
    <circle cx="260"  cy="490" r="0.9" opacity="0.38"/>
    <circle cx="1020" cy="460" r="1.1" opacity="0.4"/>
    <circle cx="350"  cy="150" r="0.8" opacity="0.35"/>
    <circle cx="540"  cy="130" r="1.3" opacity="0.5"/>
    <circle cx="880"  cy="140" r="1.0" opacity="0.42"/>
    <!-- Bright accent stars -->
    <circle cx="170"  cy="340" r="2.0" opacity="0.65" filter="url(#starBlur)"/>
    <circle cx="170"  cy="340" r="1.0" opacity="0.9"/>
    <circle cx="1030" cy="230" r="2.2" opacity="0.6" filter="url(#starBlur)"/>
    <circle cx="1030" cy="230" r="1.1" opacity="0.85"/>
    <circle cx="430"  cy="480" r="1.8" opacity="0.55" filter="url(#starBlur)"/>
    <circle cx="430"  cy="480" r="0.9" opacity="0.8"/>
    <circle cx="820"  cy="470" r="2.0" opacity="0.6" filter="url(#starBlur)"/>
    <circle cx="820"  cy="470" r="1.0" opacity="0.85"/>
  </g>

  <!-- Subtle horizontal rule / horizon line -->
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#4a9eff" stroke-width="0.5" stroke-opacity="0.08"/>

  <!-- Icon group — centered at 600, 240 -->
  <g transform="translate(600, 240)">
    <!-- Outer ring -->
    <circle r="100" fill="none" stroke="#4a9eff" stroke-width="0.8" stroke-opacity="0.2"/>
    <circle r="86"  fill="none" stroke="#4a9eff" stroke-width="0.5" stroke-opacity="0.12"/>

    <!-- Cardinal ticks -->
    <g stroke="#4a9eff" stroke-opacity="0.4" stroke-linecap="round" stroke-width="1.5">
      <line x1="0" y1="-100" x2="0" y2="-88"/>
      <line x1="0" y1="88"   x2="0" y2="100"/>
      <line x1="-100" y1="0" x2="-88" y2="0"/>
      <line x1="88"   y1="0" x2="100" y2="0"/>
    </g>

    <!-- 8-point star — main 4 points -->
    <polygon points="0,-78  8,0  0,78 -8,0"  fill="#4a9eff" fill-opacity="0.92"/>
    <polygon points="-78,0  0,-8 78,0  0,8"  fill="#4a9eff" fill-opacity="0.92"/>
    <!-- 45° rotated 4 points (shorter) -->
    <polygon points="0,-55  5.5,0  0,55 -5.5,0"  fill="#7ab8ff" fill-opacity="0.5" transform="rotate(45)"/>
    <polygon points="-55,0  0,-5.5 55,0  0,5.5"  fill="#7ab8ff" fill-opacity="0.5" transform="rotate(45)"/>

    <!-- Center glow -->
    <circle r="28" fill="url(#iconGlow)" filter="url(#softBlur)"/>
    <!-- Core -->
    <circle r="9" fill="url(#iconCore)"/>
    <circle r="4" fill="#ffffff"/>
  </g>

  <!-- App name -->
  <text
    x="600" y="388"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-size="44"
    font-weight="700"
    letter-spacing="0.18em"
    text-anchor="middle"
    fill="#e8f0ff"
  >STELLARIUM</text>

  <!-- Tagline -->
  <text
    x="600" y="430"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-size="15"
    font-weight="400"
    letter-spacing="0.12em"
    text-anchor="middle"
    fill="#4a9eff"
    opacity="0.7"
  >REAL-TIME PLANETARIUM FOR MSFS 2024</text>

  <!-- URL -->
  <text
    x="600" y="590"
    font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace"
    font-size="13"
    font-weight="400"
    letter-spacing="0.08em"
    text-anchor="middle"
    fill="#5a6585"
    opacity="0.8"
  >stellarium.volchan.fr</text>
</svg>
